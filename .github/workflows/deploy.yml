name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t thankabharathi/gitops-app:${{ github.sha }} .

      - name: Push Docker Image
        run: |
          docker push thankabharathi/gitops-app:${{ github.sha }}

      - name: Update deployment.yaml
        run: |
          sed -i 's|image: .*|image: thankabharathi/gitops-app:${{ github.sha }}|' k8s/deployment.yaml

      - name: Commit updated manifest
        run: |
          git config --global user.email "you@example.com"
          git config --global user.name "github-actions"
          git add k8s/deployment.yaml
          git commit -m "Update image version"
          git push