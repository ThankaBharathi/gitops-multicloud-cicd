```
steps:
  - name: Checkout Code
    uses: actions/checkout@v3

  - name: Login to DockerHub
    uses: docker/login-action@v2
    with:
      username: ${{ secrets.DOCKER_USERNAME }}
      password: ${{ secrets.DOCKER_PASSWORD }}

  - name: Build Docker Image
    run: docker build -t thankabharathi/gitops-app:${{ github.sha }} .

  - name: Push Docker Image
    run: docker push thankabharathi/gitops-app:${{ github.sha }}

  - name: Update Kubernetes Manifest
    run: |
      sed -i "s|image: .*|image: thankabharathi/gitops-app:${{ github.sha }}|g" k8s/deployment.yaml

  - name: Commit & Push Changes
    run: |
      git config --global user.email "thankabharathi0@gmail.com"
      git config --global user.name "github-actions"
      git add k8s/deployment.yaml
      git commit -m "Update image tag"
      git push

